# docker-compose.yml — Guide du patrimoine algérien
# Ports côté hôte décalés (8001, 5174, 3307) pour ne pas entrer en
# conflit avec HoopLeague, qui utilise déjà 8000, 5173 et 3306.

services:

  mysql:
    image: mysql:8.0
    container_name: patrimoine_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: patrimoine_db
      MYSQL_USER: patrimoine_user
      MYSQL_PASSWORD: patrimoine_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patrimoine_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8001:8000"
    depends_on:
      - mysql
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    image: node:20-alpine
    container_name: patrimoine_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  mysql_data:
